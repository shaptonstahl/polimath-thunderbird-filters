name: CI

on:
  push:
  pull_request:

jobs:
  # ── Run tests on every push and every PR ──────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run tests
        run: npm test

  # ── Build .xpi and publish a release — main branch only ──────────────────
  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases and tags

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Read version from manifest.json
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Check if version changed
        id: changed
        run: |
          prev=$(git show HEAD~1:manifest.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          if [ "$prev" = "$CURR" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          fi
        env:
          CURR: ${{ steps.version.outputs.version }}

      - name: Build .xpi
        if: steps.changed.outputs.changed == 'true'
        run: |
          zip -r "polimath-filters-${{ steps.version.outputs.version }}.xpi" \
            manifest.json \
            filter-engine.js \
            background.js \
            options.html \
            options.js \
            options.css \
            icons/ \
            LICENSE

      - name: Upload .xpi as workflow artifact
        if: steps.changed.outputs.changed == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: polimath-filters-${{ steps.version.outputs.version }}
          path: polimath-filters-${{ steps.version.outputs.version }}.xpi

      - name: Check whether this version already has a release
        if: steps.changed.outputs.changed == 'true'
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.changed.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "polimath-filters-${{ steps.version.outputs.version }}.xpi"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
